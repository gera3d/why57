name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Firebase secrets
        run: |
          missing=()
          [ -z "${{ secrets.FIREBASE_API_KEY }}"            ] && missing+=("FIREBASE_API_KEY")
          [ -z "${{ secrets.FIREBASE_AUTH_DOMAIN }}"        ] && missing+=("FIREBASE_AUTH_DOMAIN")
          [ -z "${{ secrets.FIREBASE_PROJECT_ID }}"         ] && missing+=("FIREBASE_PROJECT_ID")
          [ -z "${{ secrets.FIREBASE_STORAGE_BUCKET }}"     ] && missing+=("FIREBASE_STORAGE_BUCKET")
          [ -z "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"] && missing+=("FIREBASE_MESSAGING_SENDER_ID")
          [ -z "${{ secrets.FIREBASE_APP_ID }}"             ] && missing+=("FIREBASE_APP_ID")
          [ -z "${{ secrets.FIREBASE_MEASUREMENT_ID }}"     ] && missing+=("FIREBASE_MEASUREMENT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing GitHub Secrets: ${missing[*]}"
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All Firebase secrets present"

      - name: Generate site-config.js from secrets
        run: |
          cat > site-config.js << 'ENDOFCONFIG'
          window.WHY57_FIREBASE = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}",
            measurementId:     "${{ secrets.FIREBASE_MEASUREMENT_ID }}",
          };
          ENDOFCONFIG

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
